<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/60f7f15a55.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 class="text-center mt-3">Tic Tac Toe</h1>

    <div class="card mx-auto" style="max-width: 400px;">
        <div class="card-body p-0 d-flex justify-content-center align-items-center">
            <div class="game">
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-center gap-3 mt-4">
        <ul class="list-group">
            <li class="list-group-item active text-center">Spieler 1</li>
            <li class="list-group-item d-flex justify-content-center align-items-center">
                <i class="fa-solid fa-cookie me-2"></i>
                <div class="fw-bold fs-4">Score: <span id="score1">0</span></div>
            </li>
        </ul>

        <ul class="list-group">
            <li class="list-group-item active text-center">Spieler 2</li>
            <li class="list-group-item d-flex justify-content-center align-items-center">
                <i class="fa-solid fa-mug-saucer me-2"></i>
                <div class="fw-bold fs-4">Score: <span id="score2">0</span></div>
            </li>
        </ul>
    </div>

    <div class="msg-container hide text-center mt-4">
        <h2 id="msg"></h2>
        <button id="new-btn" class="btn btn-light mt-2">Neues Spiel</button>
    </div>

    <div class="text-center mt-3">
        <button id="reset" class="btn btn-outline-light">Spielfeld leeren</button>
    </div>
    <footer class="game-footer text-center mt-5 pb-3" style="position: relative; z-index: 1000;">
        <div class="footer-content">
            <p style="margin-bottom: 0;">
                &copy; 2026 Nino & Elias |
                <a href="impressum.html">Impressum</a>
            </p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
